name: Carly UAT Backup

# Retrieves metadata from Salesforce UAT org and backs up to carly-uat-backup branch.
# Uses SFDX Auth URL (sf org login sfdx-url) for authentication.
#
# Required GitHub Secret: SF_SFDX_AUTH_URL
# Generate locally: sf org login web --alias uat, then sf org display --json | jq -r '.result.sfdxAuthUrl'

on:
  schedule:
    - cron: '0 20 * * 5'  # Friday 8:00 PM UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Salesforce UAT (SFDX Auth URL)
        env:
          SF_SFDX_AUTH_URL: ${{ secrets.SF_SFDX_AUTH_URL }}
        run: |
          jq -n --arg url "$SF_SFDX_AUTH_URL" '{sfdxAuthUrl: $url}' > authFile.json
          jq -r '.sfdxAuthUrl' authFile.json | sf org login sfdx-url --sfdx-url-stdin --alias uat
          rm -f authFile.json

      - name: Retrieve metadata from UAT org
        run: |
          sf project retrieve start --target-org uat --manifest manifest/package.xml

      - name: Create or update carly-uat-backup branch
        run: |
          BACKUP_BRANCH="carly-uat-backup"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: UAT metadata backup $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" HEAD:${BACKUP_BRANCH} --force
