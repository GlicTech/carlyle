<template>
    <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01"
        class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <button class="slds-button slds-button_icon slds-modal__close" onclick={handleCloseModal}>
                <lightning-button-icon icon-name="utility:close" variant="bare" alternative-text="Cancel and close" size="large" title="Cancel and close"></lightning-button-icon>
                <span class="slds-assistive-text">Cancel and close</span>
            </button>
            <div class="slds-modal__header">
                <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate" tabindex="-1">Download DocGen PDF</h1>
            </div>
            <template if:true={isLoading}>
                <div class="demo-only" style="height:6rem;position:relative">
                    <div class="slds-spinner_container">
                    <div role="status" class="slds-spinner slds-spinner_medium slds-spinner_brand">
                    <span class="slds-assistive-text">Loading</span>
                    <div class="slds-spinner__dot-a"></div>
                    <div class="slds-spinner__dot-b"></div>
                    </div>
                    </div>
                    </div>
            </template>
            <template if:false={isLoading}>
            </template>
            <div class="slds-modal__footer">
                <button class="slds-button slds-button_brand" disabled={isSaveDisabled} onclick={handleDownload}>Download Templates</button>
            </div>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
</template>
