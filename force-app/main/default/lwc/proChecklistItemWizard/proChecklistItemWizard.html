<template>
    <section class="wizard-container slds-is-relative">

        <!-- Loading spinner -->
        <template lwc:if={isLoading}>
            <lightning-spinner alternative-text="Loading" size="large"
                               class="slds-is-fixed"></lightning-spinner>
        </template>

        <!-- FIXED HEADER -->
        <div class="sticky-header">

        <!-- HEADER CARDS (3-across: removed Completion card) -->
        <div class="header-row slds-grid slds-gutters slds-m-bottom_medium">

            <!-- Card 1 — Project Overview -->
            <div class="slds-col slds-size_1-of-3">
                <div class="header-card">
                    <div class="card-title">
                        <lightning-icon icon-name="action:description" size="small"
                                        class="slds-m-right_x-small"></lightning-icon>
                        Project Overview
                    </div>
                    <div class="card-body">
                        <p class="card-field">
                            <lightning-icon icon-name="utility:bookmark" size="xx-small"
                                            class="field-icon"></lightning-icon>
                            <span class="field-label">Project Name:</span>
                            <a href={projectRecordUrl} class="field-value field-link" data-id={recordId} onclick={handleNavigateToProject}>{projectName}</a>
                        </p>
                        <p class="card-field">
                            <lightning-icon icon-name="utility:people" size="xx-small"
                                            class="field-icon"></lightning-icon>
                            <span class="field-label">Operator:</span>
                            <span class="field-value">{projectOperator}</span>
                        </p>
                        <p class="card-field">
                            <lightning-icon icon-name="utility:date_input" size="xx-small"
                                            class="field-icon"></lightning-icon>
                            <span class="field-label">Start Date:</span>
                            <span class="field-value">{projectStartDate}</span>
                        </p>
                        <p class="card-field">
                            <lightning-icon icon-name="utility:event" size="xx-small"
                                            class="field-icon"></lightning-icon>
                            <span class="field-label">End Date:</span>
                            <span class="field-value">{projectEndDate}</span>
                        </p>
                        <p class="card-field">
                            <lightning-icon icon-name="utility:clock" size="xx-small"
                                            class="field-icon"></lightning-icon>
                            <span class="field-label">Days Remaining:</span>
                            <span class="field-value">{projectDaysRemaining}</span>
                        </p>
                    </div>
                </div>
            </div>

            <!-- Card 2 — Project Details -->
            <div class="slds-col slds-size_1-of-3">
                <div class="header-card">
                    <div class="card-title">
                        <lightning-icon icon-name="action:preview" size="small"
                                        class="slds-m-right_x-small"></lightning-icon>
                        Project Details
                    </div>
                    <div class="card-body">
                        <p class="card-field">
                            <lightning-icon icon-name="utility:asset_warranty" size="xx-small"
                                            class="field-icon"></lightning-icon>
                            <span class="field-label">Asset:</span>
                            <a href={assetRecordUrl} class="field-value field-link" data-id={projectAssetId} onclick={handleNavigateToAsset}>{projectAsset}</a>
                        </p>
                        <p class="card-field">
                            <lightning-icon icon-name="utility:identity" size="xx-small"
                                            class="field-icon"></lightning-icon>
                            <span class="field-label">Registration:</span>
                            <span class="field-value">{projectRegistration}</span>
                        </p>
                        <p class="card-field">
                            <lightning-icon icon-name="utility:layers" size="xx-small"
                                            class="field-icon"></lightning-icon>
                            <span class="field-label">Project Type:</span>
                            <span class="field-value">{projectType}</span>
                        </p>
                        <p class="card-field">
                            <lightning-icon icon-name="utility:priority" size="xx-small"
                                            class="field-icon"></lightning-icon>
                            <span class="field-label">Status:</span>
                            <span class="field-value">{projectStatus}</span>
                        </p>
                    </div>
                </div>
            </div>

            <!-- Card 3 — Project Utilization -->
            <div class="slds-col slds-size_1-of-3">
                <div class="header-card">
                    <div class="card-title">
                        <lightning-icon icon-name="action:update" size="small"
                                        class="slds-m-right_x-small"></lightning-icon>
                        Project Utilization
                    </div>
                    <div class="card-body">
                        <p class="card-field">
                            <lightning-icon icon-name="utility:date_input" size="xx-small"
                                            class="field-icon"></lightning-icon>
                            <span class="field-label">Total Days Budgeted:</span>
                            <span class="field-value">{utilizationBudgeted}</span>
                        </p>
                        <p class="card-field">
                            <lightning-icon icon-name="utility:trending" size="xx-small"
                                            class="field-icon"></lightning-icon>
                            <span class="field-label">Days Charged:</span>
                            <span class="field-value">{utilizationCharged}</span>
                        </p>
                        <p class="card-field">
                            <lightning-icon icon-name="utility:quote" size="xx-small"
                                            class="field-icon"></lightning-icon>
                            <span class="field-label">Utilisation Remaining:</span>
                            <span class="field-value">{utilizationRemaining}</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- LATEST PROJECT UPDATE (read-only) -->
        <div class="slds-box slds-m-bottom_medium update-section">
            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-center slds-m-bottom_x-small">
                <h3 class="slds-text-heading_small section-heading">
                    <lightning-icon icon-name="utility:comments" size="xx-small"
                                    class="slds-m-right_x-small"></lightning-icon>
                    Latest Project Update
                </h3>
            </div>
            <p class="update-text">{latestProjectUpdateDisplay}</p>
        </div>

        <!-- TOOLBAR: Filter Tabs + Actions -->
        <div class="phase-toolbar">
            <div class="phase-tabs">
                <button class={allTabClass} data-filter="All" onclick={handleFilterClick}>
                    <span class="tab-label">All</span>
                    <span class="tab-stats">
                        <span class="tab-badge">{allTabPercentage}</span>
                        <span class="tab-progress-bar">
                            <span class="tab-progress-fill" style={allTabProgressStyle}></span>
                        </span>
                        <span class="tab-badge">{allTabRatio}</span>
                    </span>
                </button>
                <button class={openTabClass} data-filter="Open" onclick={handleFilterClick}>
                    <span class="tab-label">Open</span>
                    <span class="tab-badge">{openTabBadge}</span>
                </button>
                <button class={closedTabClass} data-filter="Closed" onclick={handleFilterClick}>
                    <span class="tab-label">Closed</span>
                    <span class="tab-badge">{closedTabBadge}</span>
                </button>
                <button class={naTabClass} data-filter="NA" onclick={handleFilterClick}>
                    <span class="tab-label">N/A</span>
                    <span class="tab-badge">{naTabBadge}</span>
                </button>
            </div>
            <div class="toolbar-actions">
                <span class="item-count">{itemCountLabel}</span>
                <button class="btn" onclick={handleToggleAddForm}>
                    + Add Item
                </button>
                <button class={bulkUpdateButtonClass} onclick={handleToggleBulkUpdate}>
                    Bulk Update
                </button>
                <button class="btn" onclick={handleDiscard} disabled={noDirtyItems}>
                    &#8634; Discard
                </button>
                <button class="btn btn-brand" onclick={handleSave} disabled={noDirtyItems}>
                    Save
                </button>
            </div>
        </div>

        </div>
        <!-- END FIXED HEADER -->

        <!-- SCROLLABLE TABLE CONTAINER (Change 5) -->
        <div class="table-scroll-container">

        <!-- ADD ITEM FORM (toggleable) -->
        <template lwc:if={showAddForm}>
            <div class="add-item-form slds-m-bottom_small">
                <div class="form-row">
                    <div class="form-field form-field-title">
                        <label class="form-label">Item Name</label>
                        <lightning-input
                            type="text"
                            value={newItemName}
                            placeholder="Enter checklist item name..."
                            onchange={handleNewItemNameChange}
                            variant="label-hidden"
                            class="form-input"
                        ></lightning-input>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn btn-brand" onclick={handleAddItem}>Create Item</button>
                    <button class="btn" onclick={handleCancelAddForm}>Cancel</button>
                </div>
            </div>
        </template>

        <!-- Processing overlay -->
        <template lwc:if={isProcessing}>
            <div class="processing-overlay">
                <lightning-spinner alternative-text="Processing..." size="small"></lightning-spinner>
            </div>
        </template>

        <!-- BULK UPDATE SECTION (toggleable) -->
        <template lwc:if={showBulkUpdate}>
            <div class="bulk-update-section">
                <div class="bulk-update-header">
                    <lightning-icon icon-name="utility:multi_select_checkbox" size="xx-small"
                                    class="slds-m-right_x-small"></lightning-icon>
                    <span class="bulk-update-title">Bulk Update Fields</span>
                </div>

                <!-- Row 1 -->
                <div class="bulk-update-grid">
                    <div class="bulk-field-item">
                        <lightning-combobox label="Department" value={bulkDepartment} options={departmentOptionsWithNone} onchange={handleBulkFieldChange} data-field="Department__c" placeholder="Department" class="bulk-field-input"></lightning-combobox>
                    </div>
                    <div class="bulk-field-item">
                        <lightning-input type="date" label="Actual Start" value={bulkActualStart} onchange={handleBulkFieldChange} data-field="Actual_Start_Date__c" class="bulk-field-input"></lightning-input>
                    </div>
                    <div class="bulk-field-item">
                        <lightning-input type="date" label="Actual Completion" value={bulkActualFinish} onchange={handleBulkFieldChange} data-field="Actual_Finish_Date__c" class="bulk-field-input"></lightning-input>
                    </div>
                    <div class="bulk-field-item">
                        <lightning-input type="number" label="Days Prior" value={bulkDayPrior} onchange={handleBulkFieldChange} data-field="Day_Prior__c" placeholder="Day" step="1" class="bulk-field-input"></lightning-input>
                    </div>
                </div>

                <!-- Row 2 -->
                <div class="bulk-update-grid slds-m-top_small">
                    <div class="bulk-field-item">
                        <lightning-combobox label="% Complete" value={bulkComplete} options={completeOptionsWithNone} onchange={handleBulkFieldChange} data-field="Complete_N__c" placeholder="%" class="bulk-field-input"></lightning-combobox>
                    </div>
                    <div class="bulk-field-item">
                        <lightning-combobox label="Status" value={bulkStatus} options={statusOptionsWithNone} onchange={handleBulkFieldChange} data-field="leaseworks__Status__c" placeholder="Status" class="bulk-field-input"></lightning-combobox>
                    </div>
                    <div class="bulk-field-item">
                        <lightning-combobox label="Necessary" value={bulkNecessary} options={bulkNecessaryOptions} onchange={handleBulkFieldChange} data-field="pro_Necessary__c" placeholder="Necessary" class="bulk-field-input"></lightning-combobox>
                    </div>
                    <div class="bulk-field-item">
                        <lightning-combobox label="Assigned To" value={bulkAssignedTo} options={assignedToOptions} onchange={handleBulkFieldChange} data-field="Assigned_To__c" placeholder="Assigned" class="bulk-field-input"></lightning-combobox>
                    </div>
                </div>

                <!-- Row 3 -->
                <div class="bulk-update-grid slds-m-top_small">
                    <div class="bulk-field-item bulk-field-item_wide">
                        <lightning-input type="text" label="Comments" value={bulkComments} onchange={handleBulkFieldChange} data-field="leaseworks__Comments__c" placeholder="Comments" class="bulk-field-input"></lightning-input>
                    </div>
                </div>

                <!-- Bulk actions -->
                <div class="bulk-update-actions">
                    <button class="btn btn-brand" onclick={handleCopyToSelected}>Copy To Selected</button>
                    <button class="btn" onclick={handleCloseBulkUpdate}>Close</button>
                </div>
            </div>
        </template>

        <!-- CHECKLIST TABLE -->
        <div class={tableWrapperClass}>
            <table class="checklist-table">
                <thead>
                    <tr>
                        <!-- Actions column swaps to Select when bulk update is active -->
                        <template lwc:if={showBulkUpdate}>
                            <th class="col-select">
                                <label class="done-checkbox">
                                    <input type="checkbox" checked={isAllSelected} onchange={handleSelectAll} class="done-input" />
                                    <span class="select-circle"></span>
                                </label>
                            </th>
                        </template>
                        <template lwc:else>
                            <th class="col-actions">Actions</th>
                        </template>
                        <th class="col-number">#</th>
                        <th class="col-name">Checklist Item</th>
                        <th class="col-department">Department</th>
                        <th class="col-date">Actual Start</th>
                        <th class="col-date">Actual Completion</th>
                        <th class="col-number-sm">Days Prior</th>
                        <th class="col-number-sm">Days Remaining</th>
                        <th class="col-number-sm">% Complete</th>
                        <th class="col-status">Status</th>
                        <th class="col-necessary">Necessary</th>
                        <th class="col-comments">Comments</th>
                        <th class="col-assigned">Assigned To</th>
                        <th class="col-done">Done</th>
                    </tr>
                </thead>
                <tbody>
                    <template lwc:if={hasItems}>
                        <template for:each={enrichedItems} for:item="item">
                            <tr key={item.Id} class={item.rowClass}>
                                <!-- Actions / Select column -->
                                <template lwc:if={showBulkUpdate}>
                                    <td class="col-select">
                                        <label class="done-checkbox">
                                            <input type="checkbox"
                                                checked={item.isSelected}
                                                data-id={item.Id}
                                                onchange={handleRowSelect}
                                                class="done-input" />
                                            <span class="select-circle"></span>
                                        </label>
                                    </td>
                                </template>
                                <template lwc:else>
                                    <td class="col-actions">
                                        <lightning-button-icon
                                            icon-name="utility:edit"
                                            variant="bare"
                                            size="x-small"
                                            alternative-text="Edit"
                                            data-id={item.Id}
                                            onclick={handleOpenEditModal}
                                        ></lightning-button-icon>
                                    </td>
                                </template>
                                <td class="col-number">{item.rowNumber}</td>
                                <td class="col-name">
                                    <a href={item.recordUrl} class={item.titleClass}
                                       data-id={item.Id} onclick={handleNavigateToItem}>{item.Name}</a>
                                </td>
                                <td class="col-department">
                                    <span class="text-display">{item.Department__c}</span>
                                </td>
                                <td class="col-date">
                                    <span class="text-display">{item.actualStartDisplay}</span>
                                </td>
                                <td class="col-date">
                                    <span class="text-display">{item.actualFinishDisplay}</span>
                                </td>
                                <td class="col-number-sm">
                                    <span class="text-display">{item.dayPriorDisplay}</span>
                                </td>
                                <td class="col-number-sm">
                                    <span class="text-display">{item.daysRemainingDisplay}</span>
                                </td>
                                <td class="col-number-sm">
                                    <span class="text-display">{item.completeDisplay}</span>
                                </td>
                                <td class="col-status">
                                    <span class="text-display">{item.leaseworks__Status__c}</span>
                                </td>
                                <td class="col-necessary">
                                    <select class="inline-select"
                                            data-id={item.Id}
                                            data-field="pro_Necessary__c"
                                            onchange={handleInlineNecessaryChange}>
                                        <template for:each={item.necessarySelectOptions} for:item="opt">
                                            <option key={opt.value}
                                                    value={opt.value}
                                                    selected={opt.selected}>{opt.label}</option>
                                        </template>
                                    </select>
                                </td>
                                <td class="col-comments">
                                    <span class="text-display">{item.leaseworks__Comments__c}</span>
                                </td>
                                <td class="col-assigned">
                                    <span class="text-display">{item.assignedToName}</span>
                                </td>
                                <td class="col-done">
                                    <label class="done-checkbox">
                                        <input type="checkbox"
                                            checked={item.isCompleted}
                                            data-id={item.Id}
                                            onchange={handleDoneToggle}
                                            class="done-input" />
                                        <span class="done-circle"></span>
                                    </label>
                                </td>
                            </tr>
                        </template>
                    </template>
                    <template lwc:else>
                        <tr>
                            <td colspan="14" class="empty-message">No checklist items found.</td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination-bar slds-grid slds-grid_align-center slds-grid_vertical-center slds-m-top_small">
            <lightning-button label="Previous" icon-name="utility:chevronleft"
                              disabled={isPreviousDisabled}
                              onclick={handlePrevious}
                              class="slds-m-right_small"></lightning-button>
            <span class="slds-text-body_small page-info">
                Page {currentPage} of {totalPages}
            </span>
            <lightning-button label="Next" icon-name="utility:chevronright"
                              icon-position="right"
                              disabled={isNextDisabled}
                              onclick={handleNext}
                              class="slds-m-left_small"></lightning-button>
        </div>

        </div>
        <!-- END SCROLLABLE TABLE CONTAINER -->

        <!-- EDIT MODAL (Change 4: item picker + Change 6: field reorder + Days Prior) -->
        <template lwc:if={showEditModal}>
            <section role="dialog" tabindex="-1" aria-modal="true"
                     aria-label={editModalTitle} class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container edit-modal-container">
                    <!-- Header with item picker -->
                    <div class="slds-modal__header edit-modal-header-block">
                        <div class="edit-modal-close-row">
                            <lightning-button-icon
                                icon-name="utility:close"
                                alternative-text="Close"
                                onclick={handleCloseEditModal}
                            ></lightning-button-icon>
                        </div>
                        <div class="item-picker-wrapper">
                            <!-- Trigger field -->
                            <div class="item-picker-trigger" onclick={handleItemPickerToggle} role="button" tabindex="0">
                                <span class="item-picker-value">{editModalTitle}</span>
                                <lightning-icon icon-name="utility:chevrondown" size="xx-small" class="item-picker-chevron"></lightning-icon>
                            </div>
                            <!-- Dropdown -->
                            <template lwc:if={itemPickerOpen}>
                                <div class="item-picker-dropdown">
                                    <input type="text"
                                           class="item-picker-search"
                                           placeholder="Search items..."
                                           value={itemPickerSearch}
                                           oninput={handleItemPickerSearch} />
                                    <ul class="item-picker-list" role="listbox">
                                        <template for:each={itemPickerFilteredOptions} for:item="opt">
                                            <li key={opt.value}
                                                class="item-picker-option"
                                                data-id={opt.value}
                                                onclick={handleItemPickerSelect}
                                                role="option">
                                                {opt.label}
                                            </li>
                                        </template>
                                        <template lwc:if={itemPickerNoResults}>
                                            <li class="item-picker-no-results">No items match</li>
                                        </template>
                                    </ul>
                                </div>
                            </template>
                        </div>
                    </div>
                    <!-- Body -->
                    <div class="slds-modal__content edit-modal-body">
                        <div class="edit-modal-grid">
                            <div class="edit-modal-field edit-modal-field_wide">
                                <lightning-input type="text"
                                    label="Item Name"
                                    value={editModalFields.Name}
                                    data-field="Name"
                                    onchange={handleEditModalFieldChange}
                                ></lightning-input>
                            </div>
                            <div class="edit-modal-field">
                                <lightning-combobox
                                    label="Department"
                                    value={editModalFields.Department__c}
                                    options={departmentOptionsWithNone}
                                    data-field="Department__c"
                                    onchange={handleEditModalFieldChange}
                                ></lightning-combobox>
                            </div>
                            <div class="edit-modal-field">
                                <lightning-combobox
                                    label="Status"
                                    value={editModalFields.leaseworks__Status__c}
                                    options={statusOptionsWithNone}
                                    data-field="leaseworks__Status__c"
                                    onchange={handleEditModalFieldChange}
                                ></lightning-combobox>
                            </div>
                            <div class="edit-modal-field">
                                <lightning-combobox
                                    label="Necessary"
                                    value={editModalFields.pro_Necessary__c}
                                    options={necessaryOptions}
                                    data-field="pro_Necessary__c"
                                    onchange={handleEditModalFieldChange}
                                ></lightning-combobox>
                            </div>
                            <div class="edit-modal-field">
                                <lightning-combobox
                                    label="Assigned To"
                                    value={editModalFields.Assigned_To__c}
                                    options={assignedToOptions}
                                    data-field="Assigned_To__c"
                                    onchange={handleEditModalFieldChange}
                                ></lightning-combobox>
                            </div>
                            <div class="edit-modal-field">
                                <lightning-combobox
                                    label="Responsible Party (Lessor/Lessee)"
                                    value={editModalFields.leaseworks__Responsible_Party__c}
                                    options={responsiblePartyOptionsWithNone}
                                    data-field="leaseworks__Responsible_Party__c"
                                    onchange={handleEditModalFieldChange}
                                ></lightning-combobox>
                            </div>
                            <div class="edit-modal-field">
                                <lightning-input type="date"
                                    label="Actual Start Date"
                                    value={editModalFields.Actual_Start_Date__c}
                                    data-field="Actual_Start_Date__c"
                                    onchange={handleEditModalFieldChange}
                                ></lightning-input>
                            </div>
                            <div class="edit-modal-field">
                                <lightning-input type="date"
                                    label="Actual Completion Date"
                                    value={editModalFields.Actual_Finish_Date__c}
                                    data-field="Actual_Finish_Date__c"
                                    onchange={handleEditModalFieldChange}
                                ></lightning-input>
                            </div>
                            <div class="edit-modal-field">
                                <lightning-input type="number"
                                    label="Duration (Days)"
                                    value={editModalFields.Duration_Days_N__c}
                                    data-field="Duration_Days_N__c"
                                    step="1"
                                    onchange={handleEditModalFieldChange}
                                ></lightning-input>
                            </div>
                            <div class="edit-modal-field">
                                <lightning-input type="number"
                                    label="Days Prior"
                                    value={editModalFields.Day_Prior__c}
                                    data-field="Day_Prior__c"
                                    step="1"
                                    onchange={handleEditModalFieldChange}
                                ></lightning-input>
                            </div>
                            <div class="edit-modal-field">
                                <lightning-combobox
                                    label="% Complete"
                                    value={editModalFields.Complete_N__c}
                                    options={completeOptionsWithNone}
                                    data-field="Complete_N__c"
                                    onchange={handleEditModalFieldChange}
                                ></lightning-combobox>
                            </div>
                            <div class="edit-modal-field edit-modal-field_wide">
                                <lightning-textarea
                                    label="Comments"
                                    value={editModalFields.leaseworks__Comments__c}
                                    data-field="leaseworks__Comments__c"
                                    onchange={handleEditModalFieldChange}
                                ></lightning-textarea>
                            </div>
                        </div>
                    </div>
                    <!-- Footer -->
                    <div class="slds-modal__footer edit-modal-footer">
                        <button class="btn" onclick={handleCloseEditModal}>Cancel</button>
                        <button class="btn btn-brand" onclick={handleSaveEditModal}>Confirm</button>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>


        <!-- NECESSARY COMMENT MODAL (GT-18 — fires on Necessary != Yes) -->
        <template lwc:if={showNecessaryModal}>
            <section role="dialog" tabindex="-1" aria-modal="true"
                     aria-label="Comment Required" class="slds-modal slds-fade-in-open na-comment-modal">
                <div class="slds-modal__container edit-modal-container">
                    <div class="slds-modal__header edit-modal-header">
                        <h2 class="slds-modal__title slds-hyphenate">Comment Required</h2>
                    </div>
                    <div class="slds-modal__content edit-modal-body">
                        <p class="na-modal-subtitle">Please explain why this item is not necessary.</p>
                        <label class="na-field-label">Comment</label>
                        <textarea
                            class="comment-textarea"
                            value={necessaryCommentText}
                            onchange={handleNecessaryCommentChange}
                            oninput={handleNecessaryCommentChange}
                            placeholder="Enter comment..."
                        ></textarea>
                        <template lwc:if={necessaryCommentValidationError}>
                            <p class="slds-text-color_error slds-m-top_x-small">A comment is required.</p>
                        </template>
                    </div>
                    <div class="slds-modal__footer edit-modal-footer">
                        <button class="btn" onclick={handleNecessaryModalCancel}>Cancel</button>
                        <button class="btn btn-brand" onclick={handleNecessaryModalConfirm}>Confirm</button>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open na-backdrop"></div>
        </template>
    </section>
</template>
