<template>
    <div class="slds-box slds-theme_default slds-m-around_medium">
        <lightning-combobox
            name="template"
            label="Select Template"
            value={selectedTemplate}
            options={templateOptions}
            onchange={handleTemplateChange}>
        </lightning-combobox>
    </div>

    <template if:true={fieldMappings}>
        <div class="slds-box slds-theme_shade slds-m-around_medium">
            <div class="slds-grid slds-text-title_bold slds-border_bottom slds-p-bottom_x-small">
                <div class="slds-col slds-size_1-of-3">Field Name</div>
                <div class="slds-col slds-size_1-of-3">Data Type</div>
                <div class="slds-col slds-size_1-of-3">Value</div>
            </div>
            <template for:each={fieldMappings} for:item="field">
                <div key={field.destinationField} class="slds-grid slds-p-vertical_x-small">
                    <div class="slds-col slds-size_1-of-3">{field.destinationField}</div>
                    <div class="slds-col slds-size_1-of-3">{field.dataType}</div>
                    <div class="slds-col slds-size_1-of-3">
                        <lightning-input
                            type="text"
                            data-field={field.destinationField}
                            value={field.value}
                            onchange={handleInputChange}>
                        </lightning-input>
                    </div>
                </div>
            </template>
        </div>
    </template>
</template>
