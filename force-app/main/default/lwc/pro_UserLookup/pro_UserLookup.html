<template>
    <div class="slds-form-element pro-user-lookup">
        <div class="slds-form-element__control">
            <!-- Search state: no value selected -->
            <template if:false={isValueSelected}>
                <div class="slds-combobox_container">
                    <div class={comboboxClass}>
                        <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                            <lightning-input
                                type="search"
                                autocomplete="off"
                                label={label}
                                placeholder={placeholder}
                                value={searchString}
                                onchange={handleChange}
                                onblur={handleInputBlur}>
                            </lightning-input>
                        </div>
                    </div>
                    <template if:true={hasResults}>
                        <div
                            class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid lookup-dropdown"
                            role="listbox"
                            onblur={handleDropdownBlur}
                            onmousedown={handleDropdownMouseDown}>
                            <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                <template for:each={recordsList} for:item="rec">
                                    <li key={rec.id} class="slds-listbox__item" role="presentation">
                                        <div
                                            class="slds-media slds-listbox__option slds-listbox__option_entity slds-p-around_x-small lookup-option"
                                            role="option"
                                            data-id={rec.id}
                                            data-name={rec.name}
                                            onclick={handleSelect}>
                                            <span class="slds-media__figure">
                                                <lightning-icon icon-name="standard:user" size="small" alternative-text="User"></lightning-icon>
                                            </span>
                                            <span class="slds-media__body">
                                                <span class="slds-listbox__option-text slds-listbox__option-text_entity">{rec.name}</span>
                                            </span>
                                        </div>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </template>
                </div>
            </template>
            <!-- Selected state: show selected value and clear button -->
            <template if:true={isValueSelected}>
                <label class="slds-form-element__label" for="user-lookup-selected">{label}</label>
                <div class="slds-combobox_container slds-has-selection">
                    <div class="slds-combobox slds-dropdown-trigger slds-dropdown-trigger_click">
                        <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_left-right" role="none">
                            <span class="slds-icon_container slds-icon-standard-user slds-combobox__input-entity-icon">
                                <lightning-icon icon-name="standard:user" alternative-text="User" size="x-small"></lightning-icon>
                            </span>
                            <span class="slds-input_faux slds-combobox__input slds-combobox__input-value" id="user-lookup-selected">
                                <span class="slds-truncate">{selectedRecordName}</span>
                            </span>
                            <button
                                type="button"
                                class="slds-button slds-button_icon slds-input__icon slds-input__icon_right"
                                title="Clear selection"
                                onclick={handleClear}>
                                <lightning-icon icon-name="utility:close" alternative-text="Clear" size="x-small"></lightning-icon>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>
